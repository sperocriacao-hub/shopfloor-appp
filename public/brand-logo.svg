<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>
      .cls-1 { fill: #ffffff; }
      .cls-2 { font-family: Arial, Helvetica, sans-serif; font-weight: bold; font-size: 60px; fill: #ffffff; }
    </style>
  </defs>
  <!-- Stylized B Shape -->
  <!-- Vertical backbone and top/bottom bars -->
  <path class="cls-1" d="M100 100 H 300 A 80 80 0 0 1 300 260 H 100 V 100 Z" fill="none" stroke="white" stroke-width="0"/> 
  <!-- Actually drawing it as a path -->
  <path class="cls-1" d="M140 100 H 320 C 400 100 440 160 400 220 C 450 260 450 360 360 412 H 140 V 320 H 340 C 380 320 380 380 340 380 H 200 V 412 H 140 Z"/>
  
  <!-- Let's try a simpler Block B approach combined with the speed line -->
  <!-- Main Body -->
  <path class="cls-1" d="
    M 150 100 
    L 320 100 
    C 420 100 420 230 350 245 
    C 440 260 440 412 320 412 
    L 150 412 
    L 150 330
    L 310 330
    C 360 330 360 275 310 275
    L 60 275 
    L 60 225
    L 310 225
    C 350 225 350 160 310 160
    L 150 160 
    Z
  "/>
  
  <!-- TM mark -->
  <text x="440" y="140" class="cls-2">TM</text>
</svg>
